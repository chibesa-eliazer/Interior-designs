<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen & Storage | LUXE</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #ffffff;
            --text-main: #1a1a1a;
            --accent: #d4af37;
            --glass-blue: rgba(10, 31, 65, 0.85); 
            --glass-border: rgba(100, 180, 255, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; scroll-behavior: smooth; }

        /* Sticky Glass Header */
        header {
            padding: 20px 0;
            text-align: center;
            position: sticky;
            top: 20px;
            width: 90%;
            margin: 0 auto;
            border-radius: 100px;
            background: var(--glass-blue);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            z-index: 1000;
        }

        .logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; letter-spacing: 8px; text-transform: uppercase; color: #fff; margin-bottom: 5px; }
        nav a { text-decoration: none; color: rgba(255,255,255,0.7); margin: 0 15px; font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; }
        nav a:hover { color: var(--accent); }

        .container { max-width: 1400px; margin: 60px auto; padding: 0 20px; }
        
        .section-header { text-align: center; margin-bottom: 50px; margin-top: 40px; }
        .section-header h2 { font-family: 'Playfair Display', serif; font-size: 2.8rem; font-style: italic; font-weight: 400; }
        
        .separator { width: 150px; height: 1px; background: var(--accent); margin: 15px auto; position: relative; }

        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; margin-bottom: 80px; }
        .grid-item { position: relative; overflow: hidden; border-radius: 24px; height: 480px; background: #f4f4f4; }
        .grid-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 1.2s cubic-bezier(0.2, 1, 0.3, 1); }
        .grid-item:hover img { transform: scale(1.1); }

        .item-info {
            position: absolute;
            bottom: 20px; left: 20px; right: 20px;
            padding: 20px;
            background: var(--glass-blue);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            color: white;
        }

        .item-info h3 { font-family: 'Playfair Display', serif; font-size: 1rem; }
        .item-info span { font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; opacity: 0.8; }

        @media (max-width: 1100px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 750px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header>
        <div class="logo">LUXE</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="bedroom.html">Bedrooms</a>
            <a href="kitchen.html" style="color: var(--accent);">Kitchens</a>
            <a href="livingrooms.html">Living</a>
            <a href="colors.html">Colors</a>
        </nav>
    </header>

    <main class="container">
        <!-- Part 1: Culinary Spaces -->
        <div class="section-header">
            <h2>The Culinary Studio</h2>
            <div class="separator"></div>
        </div>
        <div id="kitchen-grid" class="grid"></div>

        <!-- Part 2: Storage & Pantries -->
        <div class="section-header">
            <h2>Storage & Utility</h2>
            <div class="separator"></div>
        </div>
        <div id="storage-grid" class="grid"></div>
    </main>

    <script>
        const folderPath = 'kitchen/'; // Adjusted to your specific folder

        function createCard(num, label) {
            const div = document.createElement('div');
            div.className = 'grid-item';
            div.innerHTML = `
                <img src="${folderPath}${num}.jpeg" loading="lazy">
                <div class="item-info">
                    <h3>${label}</h3>
                    <span>Project Ref: ${num}</span>
                </div>
            `;
            return div;
        }

        const kitchenGrid = document.getElementById('kitchen-grid');
        const storageGrid = document.getElementById('storage-grid');

        // Part 1: Kitchens (1 - 38)
        for (let i = 1; i <= 38; i++) {
            kitchenGrid.appendChild(createCard(i, 'Designer Kitchen'));
        }

        // Part 2: Storage (39 - 49)
        for (let i = 39; i <= 49; i++) {
            storageGrid.appendChild(createCard(i, 'Utility Space'));
        }
    </script>
</body>
</html>
