<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUXE | Interior Architecture</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f141a;
            --white: #ffffff;
            --accent: #d4af37;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background-color: var(--bg); 
            color: var(--white); 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; /* Keeps the page static and clean */
        }

        /* Full Screen Hero Section */
        .hero {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            /* Using a high-end architectural background */
            background: linear-gradient(rgba(15,20,26,0.4), rgba(15,20,26,0.7)), 
                        url('https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?auto=format&fit=crop&q=80&w=1600') center/cover;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3.5rem, 12vw, 7rem);
            font-weight: 400;
            font-style: italic;
            margin-bottom: 10px;
            color: var(--white);
            letter-spacing: -2px;
        }

        .hero p {
            letter-spacing: 10px; 
            color: var(--accent);
            text-transform: uppercase;
            font-size: 0.9rem;
            margin-bottom: 60px;
            opacity: 0.8;
        }

        /* The single entry point */
        .btn {
            padding: 22px 60px;
            border: 1px solid var(--accent);
            background: transparent;
            color: var(--accent);
            cursor: pointer;
            letter-spacing: 5px;
            font-size: 0.8rem;
            text-transform: uppercase;
            transition: 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
            border-radius: 0px; /* Sharp corners for a more architectural feel */
        }

        .btn:hover {
            background: var(--accent);
            color: #0f141a;
            box-shadow: 0 10px 40px rgba(212, 175, 55, 0.25);
            transform: translateY(-5px);
        }

        @media (max-width: 750px) {
            .hero h1 { font-size: 3.8rem; }
            .hero p { letter-spacing: 5px; font-size: 0.7rem; }
            .btn { padding: 18px 40px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1>Refined Living</h1>
        <p>Bespoke Interior Architecture</p>
        <button class="btn" onclick="location.href='colors.html'">ENTER THE COLLECTION</button>
    </section>

</body>
</html>
